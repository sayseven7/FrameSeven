name: PR Check Go

permissions:
  contents: read
  pull-requests: write

on:
  push:
    paths:
      - "*.go"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/pr-check-go.yml"

  pull_request:
    paths:
      - "*.go"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/pr-check-go.yml"

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Go Vet
        run: go vet ./...

      - name: Go Fmt
        run: go fmt ./...

      - name: Install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1

      - name: Staticcheck
        run: staticcheck ./...

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Gosec
        run: gosec ./...

      - name: Install Govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck
        run: govulncheck ./...

      - name: Create bin directory if it doesn't exist
        run: mkdir -p bin/frameseven/cli

      - name: Build
        run: go build -o bin/frameseven/cli/v1 ./cmd/cli/v1/main.go

      - name: Check if the binary was created
        run: |
          if [ -f "bin/frameseven/cli/v1" ]; then
            echo "Binary created successfully."
          else
            echo "Error: Binary not found!"
            exit 1
          fi

      - name: Test
        run: go test $(go list ./... | grep -v /cmd/)

      - name: Test Race
        run: go test --race $(go list ./... | grep -v /cmd/)
