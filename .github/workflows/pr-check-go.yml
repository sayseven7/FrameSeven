name: PR Check Go

permissions:
  contents: read
  pull-requests: write

on:
  push:
    paths:
      - "**/*.go"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/pr-check-go.yml"

  pull_request:
    paths:
      - "**/*.go"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/pr-check-go.yml"

jobs:
  discover-cli-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Discover CLI versions
        id: versions
        run: |
          versions=$(find cmd/cli -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)

          if [ -z "$versions" ]; then
            echo "Error: no CLI versions found in cmd/cli"
            exit 1
          fi

          json=$(printf '%s\n' "$versions" | sed 's/.*/"&"/' | paste -sd, -)
          echo "versions=[$json]" >> "$GITHUB_OUTPUT"

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Go Vet
        run: go vet ./...

      - name: Go Fmt
        run: go fmt ./...

      - name: Install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1

      - name: Staticcheck
        run: staticcheck ./...

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Gosec
        run: gosec ./...

      - name: Install Govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck
        run: govulncheck ./...

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install fpdf2
        run: python3 -m pip install fpdf2

      - name: Test
        run: go test $(go list ./... | grep -v /cmd/)

      - name: Test Race
        run: go test --race $(go list ./... | grep -v /cmd/)

  cli:
    runs-on: ubuntu-latest
    needs:
      - discover-cli-versions
      - quality
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.discover-cli-versions.outputs.versions) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Create bin directory if it doesn't exist
        run: mkdir -p bin/frameseven/cli

      - name: Build
        run: go build -o bin/frameseven/cli/${{ matrix.version }} ./cmd/cli/${{ matrix.version }}/main.go

      - name: Check if the binary was created
        run: |
          if [ -f "bin/frameseven/cli/${{ matrix.version }}" ]; then
            echo "Binary created successfully."
          else
            echo "Error: Binary not found!"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install fpdf2
        run: python3 -m pip install fpdf2

      - name: Test CLI package
        run: go test -v ./cmd/cli/${{ matrix.version }}/...
